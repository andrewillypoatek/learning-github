<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <link rel="stylesheet" href="style.css" />
<link rel="icon" type="image/svg+xml" href="favicon.svg">
  </head>
  <body>
    <div class="wrap">
      <div class="card">

        <!-- ✏️ Replace with your own image or gif URL -->
        <img src="https://media1.tenor.com/m/ekC8G7GhYhwAAAAd/test-nice.gif" alt="hero" class="hero-image">

        <!-- ✏️ Your name -->
        <div class="name">Your Name</div>

        <!-- ✏️ Your role -->
        <div class="role">// Your Role</div>

        <hr class="divider">

        <div class="field">
          <label>About</label>
          <!-- ✏️ A sentence or two about yourself -->
          <p>Tell us something about yourself.</p>
        </div>

        <div class="field">
          <label>Fun fact</label>
          <!-- ✏️ Something fun or surprising -->
          <p>Something people might not know about you.</p>
        </div>

      </div>
    </div>
  </body>
</html>
