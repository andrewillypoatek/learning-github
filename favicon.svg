<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer dark border -->
  <rect width="100" height="100" rx="20" ry="20" fill="#111111"/>
  <!-- Blue background -->
  <rect x="5" y="5" width="90" height="90" rx="16" ry="16" fill="#2222EE"/>

  <!-- Branch lines (cream, rounded caps) -->
  <!-- Vertical: top node to bottom node -->
  <line x1="43" y1="24" x2="43" y2="76" stroke="#F2ECD8" stroke-width="8" stroke-linecap="round"/>
  <!-- Diagonal: midpoint to right node -->
  <line x1="43" y1="52" x2="72" y2="47" stroke="#F2ECD8" stroke-width="8" stroke-linecap="round"/>

  <!-- Top node -->
  <circle cx="43" cy="22" r="12" fill="#F2ECD8"/>
  <circle cx="43" cy="22" r="5" fill="#111111"/>

  <!-- Bottom node (larger) -->
  <circle cx="43" cy="78" r="14" fill="#F2ECD8"/>
  <circle cx="43" cy="78" r="6" fill="#111111"/>

  <!-- Right (branch) node -->
  <circle cx="73" cy="47" r="11" fill="#F2ECD8"/>
  <circle cx="73" cy="47" r="5" fill="#111111"/>
</svg>
